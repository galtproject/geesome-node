server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root %app_dir%;
    index index.html index.htm index.nginx-debian.html;

    proxy_buffering off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve the OpenAPI spec at conventional paths instead of the SPA shell, so an
    # agent guessing /openapi.json (etc.) gets the real spec from the node.
    location = /openapi.json { proxy_pass http://127.0.0.1:2052/openapi.json; }
    location = /swagger.json { proxy_pass http://127.0.0.1:2052/swagger.json; }
    location = /api-docs.json { proxy_pass http://127.0.0.1:2052/api-docs.json; }
    location = /.well-known/openapi.json { proxy_pass http://127.0.0.1:2052/.well-known/openapi.json; }

    location /ipfs/ {
        proxy_pass http://127.0.0.1:2052/ipfs/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        client_max_body_size 2000m;
        proxy_pass http://127.0.0.1:2052/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
