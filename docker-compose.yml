services:
  web:
    container_name: geesome
    build: .
    command: npm run in-docker-start
    restart: always
    ports:
      - "2052:2052"
      - "2082:2082"
    depends_on:
      - ipfs
      - postgres
    volumes:
      - "${GEESOME_DATA:-./.docker-data/geesome-data}:/geesome-node/data"
      - "${GEESOME_FRONTEND_DIST:-./.docker-data/geesome-frontend}:/geesome-node/frontend/docker-dist"
      - "${GEESOME_TEMP:-./.docker-data/geesome-temp}:/tmp"
    environment:
      - IPFS_PROFILE
      - SSG_RUNTIME
      # Debug/logging knobs. Interpolated so they can be set via a project-dir
      # .env file (or the shell/systemd env). Default empty -> off. See DEBUG.md.
      - DEBUG=${DEBUG:-}
      - GEESOME_MEMORY_LOG_FILE=${GEESOME_MEMORY_LOG_FILE:-}
      - GEESOME_MEMORY_LOGS_INTERVAL=${GEESOME_MEMORY_LOGS_INTERVAL:-}
      - GEESOME_ACCESS_LOGS=${GEESOME_ACCESS_LOGS:-}
      - GEESOME_DEPENDENCY_INFO_LOGS=${GEESOME_DEPENDENCY_INFO_LOGS:-}
      - GEESOME_LOG_SQL=${GEESOME_LOG_SQL:-}
      - DATABASE_USER=geesome
      - DATABASE_PASSWORD=geesome
      - DATABASE_NAME=geesome_node
      - DATABASE_HOST=geesome_db
      - DATABASE_PORT=5432

  postgres:
    container_name: geesome_db
    image: postgres:14-alpine
    restart: always
    expose:
      - 5432
    volumes:
      - "${POSTGRES_DATA:-./.docker-data/postgres-data}:/var/lib/postgresql/data"
    environment:
      - POSTGRES_PASSWORD=geesome
      - POSTGRES_USER=geesome
      - POSTGRES_DB=geesome_node

  client:
    image: nginx
    ports:
      - "127.0.0.1:2042:80"
    volumes:
      - "${GEESOME_FRONTEND_DIST:-./.docker-data/geesome-frontend}:/usr/share/nginx/html"

  temp-cleaner:
    container_name: geesome_temp_cleaner
    image: alpine:3.20
    restart: always
    volumes:
      - "${GEESOME_TEMP:-./.docker-data/geesome-temp}:/geesome-temp"
    environment:
      - GEESOME_TEMP_MAX_AGE_MINUTES=${GEESOME_TEMP_MAX_AGE_MINUTES:-1440}
      - GEESOME_TEMP_CLEAN_INTERVAL_SECONDS=${GEESOME_TEMP_CLEAN_INTERVAL_SECONDS:-3600}
    # Last-resort cleanup for temp files left after crashes or killed uploads.
    command:
      - sh
      - -ec
      - |
        while true; do
          find /geesome-temp -mindepth 1 -maxdepth 1 -mmin +"$${GEESOME_TEMP_MAX_AGE_MINUTES}" -exec rm -rf {} +
          sleep "$${GEESOME_TEMP_CLEAN_INTERVAL_SECONDS}"
        done

  ipfs:
    container_name: go_ipfs
    image: "ipfs/kubo:v0.21.0"
    restart: always
    environment:
      - IPFS_PROFILE
    # Use the image default entrypoint (start_ipfs) via command so the repo is
    # auto-initialized (ipfs init) on a fresh server and IPFS_PROFILE is applied.
    # Overriding entrypoint with a bare `ipfs daemon` skips init and crash-loops
    # on first boot with "no IPFS repo found".
    command: ["daemon", "--migrate=true"]
    expose:
      - 5001
    ports:
      - "4001:4001"
      - "8080:8080"
    volumes:
      - "${STORAGE_STAGING:-./.docker-data/ipfs-staging}:/export"
      - "${STORAGE_DATA:-./.docker-data/ipfs}:/data/ipfs"
